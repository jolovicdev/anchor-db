<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>AnchorDB</title>
  <style>
    body { font-family: ui-sans-serif, system-ui, sans-serif; max-width: 1080px; margin: 40px auto; padding: 0 16px; }
    table { border-collapse: collapse; width: 100%; }
    th, td { padding: 8px; border-bottom: 1px solid #ddd; text-align: left; }
    code { background: #f5f5f5; padding: 2px 4px; border-radius: 4px; }
    a { text-decoration: none; color: #0b5ed7; }
  </style>
</head>
<body>
  <h1>AnchorDB</h1>
  <p>Local code memory for files, spans, and symbols.</p>
  <table>
    <thead>
      <tr>
        <th>Repo</th>
        <th>Path</th>
        <th>Anchors</th>
        <th>Viewer</th>
      </tr>
    </thead>
    <tbody>
      {{range .Repos}}
      <tr>
        <td><code>{{.ID}}</code><br>{{.Name}}</td>
        <td>{{.Path}}</td>
        <td>{{.Anchors}}</td>
        <td><a href="/view?repo_id={{.ID}}&ref=WORKTREE&path=sample.go">open sample.go</a></td>
      </tr>
      {{else}}
      <tr>
        <td colspan="4">No repos registered yet.</td>
      </tr>
      {{end}}
    </tbody>
  </table>
</body>
</html>
